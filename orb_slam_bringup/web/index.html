<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ORB Lidar Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="status-bar">
    <span class="brand">ORB Lidar</span>
    <span id="conn" class="badge badge-disconnected">connecting</span>
    <span id="track" class="badge">--</span>
    <span id="recovery" class="badge" hidden>RECOVERY</span>
    <span class="meta">backend track <b id="trackHz">0.0</b> Hz</span>
    <span class="meta">odom <b id="odomHz">0.0</b> Hz</span>
    <span class="meta">kp <b id="kp">0</b></span>
    <span class="spacer"></span>
    <span id="revisions" class="meta">g<b id="graphRev">0</b> / m<b id="mapRev">0</b></span>
    <span id="loops" class="meta">loops <b id="loopCount">0</b></span>
    <span id="rebuild" class="meta"></span>
  </header>

  <main class="main">
    <section class="grid">
      <div class="panel panel-map">
        <div class="panel-title">Map + robot</div>
        <div class="canvas-wrap">
          <canvas id="map"></canvas>
          <div id="waiting" class="waiting">Waiting for committed map…</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Odometry (raw wheel) <span class="hz" id="odomHz2">0.0 Hz</span></div>
        <div class="canvas-wrap"><canvas id="odom"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">ORB pose (raw) <span class="hz" id="orbHz">0.0 Hz</span></div>
        <div class="canvas-wrap"><canvas id="orb"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">Corrected pose (loop-optimized)</div>
        <div class="canvas-wrap"><canvas id="corrected"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">Loop closures <span class="hz" id="loopInfo">0 edges</span></div>
        <div class="canvas-wrap"><canvas id="loopgraph"></canvas></div>
      </div>
    </section>
    <aside class="side">
      <h2>Events</h2>
      <ul id="events" class="events"></ul>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
