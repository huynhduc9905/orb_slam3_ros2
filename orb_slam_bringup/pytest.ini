[pytest]
# Disable auto-loaded plugins that break plain unit-test collection under
# pytest 9 (launch_testing_ros registers hooks only provided by launch_testing).
addopts =
    -p no:launch_testing
    -p no:launch_ros
    -p no:ament_copyright
    -p no:ament_flake8
    -p no:ament_pep257
    -p no:ament_xmllint
    -p no:ament_lint
testpaths = test
junit_family = xunit2
